<style>
:root{--bg:#070d07;--g:#39ff14;--gd:rgba(57,255,20,.5);--r:#ff4040;--y:#ffb800;--t:#e8f5e8;--m:#5a7a5a;--b:rgba(57,255,20,.12);--b2:rgba(57,255,20,.28);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;}
#root{position:relative;z-index:1;}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fl{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes sc{from{transform:translateY(-100%)}to{transform:translateY(100vh)}}
.fu{animation:fu .5s ease both}
.spin{animation:sp 1s linear infinite}
.fl{animation:fl 2s ease infinite}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 16px 48px;}
.box{width:100%;max-width:620px;}
.card{background:rgba(13,22,13,.9);border:1px solid var(--b);border-radius:14px;padding:22px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent);}
.inp{width:100%;background:rgba(57,255,20,.04);border:1px solid var(--b);border-radius:10px;padding:12px 14px;color:var(--t);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:.2s;}
.inp:focus{border-color:var(--gd);background:rgba(57,255,20,.07);}
.inp::placeholder{color:var(--m);}
select.inp{cursor:pointer;}
textarea.inp{resize:vertical;min-height:90px;}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em;transition:.2s;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.bp{background:var(--g);color:var(--bg);padding:14px;font-size:14px;width:100%;}
.bp:hover:not(:disabled){opacity:.85;transform:translateY(-1px);}
.bg{background:transparent;border:1px solid var(--b2);color:var(--t);padding:11px 20px;font-size:13px;}
.bg:hover{background:rgba(57,255,20,.07);}
.bsm{padding:7px 14px;font-size:12px;}
.lbl{display:block;font-family:'DM Mono',monospace;font-size:11px;color:var(--m);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.bdg{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;}
.br{background:rgba(255,64,64,.15);border:1px solid rgba(255,64,64,.3);color:var(--r);}
.by{background:rgba(255,184,0,.15);border:1px solid rgba(255,184,0,.3);color:var(--y);}
.bgg{background:rgba(57,255,20,.12);border:1px solid rgba(57,255,20,.25);color:var(--g);}
.bm{background:rgba(255,255,255,.05);border:1px solid var(--b);color:var(--m);}
.div{height:1px;background:var(--b);margin:16px 0;}
.stit{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--m);margin-bottom:12px;}
.mono{font-family:'DM Mono',monospace;font-size:12px;}
.bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(7,13,7,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);}
.logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.05em;color:var(--g);cursor:pointer;display:flex;align-items:center;gap:8px;}
.nb{background:none;border:none;cursor:pointer;color:var(--m);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:5px 10px;border-radius:6px;transition:.2s;}
.nb:hover{color:var(--g);background:rgba(57,255,20,.07);}
.scan{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(57,255,20,.18),transparent);animation:sc 4s linear infinite;pointer-events:none;z-index:50;}
.si{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;border:1px solid transparent;transition:.4s;}
.si.ac{border-color:var(--b2);background:rgba(57,255,20,.05);}
.si.dn{opacity:.4;}
.si.wt{opacity:.15;}
.ring{position:relative;width:88px;height:88px;flex-shrink:0;}
.ring svg{transform:rotate(-90deg);}
.rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.tact{border-left:2px solid rgba(255,64,64,.35);padding-left:14px;margin-bottom:14px;}
.tact:last-child{margin-bottom:0;}
.hist{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;border:1px solid var(--b);cursor:pointer;transition:.2s;margin-bottom:8px;}
.hist:hover{border-color:var(--b2);background:rgba(57,255,20,.04);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,64,64,.15);border:1px solid rgba(255,64,64,.4);color:#ff8080;padding:10px 18px;border-radius:10px;font-family:'DM Mono',monospace;font-size:12px;z-index:200;max-width:90vw;text-align:center;animation:fu .3s ease both;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px;}
</style>
</head>

/* GEMINI */
const MODELS = ['gemini-2.5-flash-lite','gemini-2.5-flash','gemini-2.5-pro'];

async function callModel(apiKey, model, prompt, useSearch, forceJson) {
  const body = {
    contents: [{parts: [{text: prompt}]}],
    generationConfig: {
      temperature: 0.3, maxOutputTokens: 3000,
      ...(forceJson && !useSearch ? {responseMimeType:'application/json'} : {})
    },
    ...(useSearch ? {tools:[{googleSearch:{}}]} : {})
  };
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
    {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}
  );
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  const chunks = data?.candidates?.[0]?.groundingMetadata?.groundingChunks||[];
  const sources = chunks.map(c=>({title:c?.web?.title||'',url:c?.web?.uri||''})).filter(s=>s.url);
  return {text, sources};
}

async function geminiSearch(apiKey, prompt, onStep) {
  let lastErr;
  for(const model of MODELS){
    try{
      onStep&&onStep(`${model} ile aranıyor...`);
      const r = await callModel(apiKey, model, prompt, true, false);
      if(r.text){onStep&&onStep('Arama tamamlandı ✓');return r;}
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error('Arama basarisiz');
}

async function geminiJson(apiKey, prompt, onStep) {
  let lastErr;
  for(const model of MODELS){
    for(const fj of [true,false]){
      try{
        onStep&&onStep(`${model} analiz ediyor...`);
        const r = await callModel(apiKey, model, prompt, false, fj);
        const s = r.text.replace(/```json/gi,'').replace(/```/g,'').trim();
        const start = s.indexOf('{'), end = s.lastIndexOf('}');
        if(start===-1||end===-1) continue;
        const parsed = JSON.parse(s.slice(start,end+1));
        onStep&&onStep('Analiz tamamlandı ✓');
        return parsed;
      }catch(e){lastErr=e;}
    }
  }
  throw new Error('Analiz basarisiz: '+(lastErr?.message||''));
}

/* SCORE RING */
function Ring({score}) {
  const r=37, circ=2*Math.PI*r;
  const offset=circ-(score/100)*circ;
  const color=score>65?'var(--r)':score>35?'var(--y)':'var(--g)';
  return(
    <div className="ring">
      <svg viewBox="0 0 88 88" width="88" height="88">
        <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="6"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:'stroke-dashoffset 1.2s ease'}}/>
      </svg>
      <div className="rv" style={{color}}>{score}</div>
    </div>
  );
}

/* APP */
function App() {
  const [page,setPage]=useState('/');
  const [ctx,setCtx]=useState(null);
  const [result,setResult]=useState(null);
  const [error,setError]=useState('');
  const [streamText,setStreamText]=useState('');
  const [currentStep,setCurrentStep]=useState(0);
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem('gw_history')||'[]');}catch{return [];}});

  const saveHistory=(company,r)=>{
    const item={company,score:r.manipulasyon_skoru||0,verdict:r.verdict||'Şüpheli',sector:r.sektor||'',date:new Date().toLocaleDateString('tr-TR'),result:r};
    const updated=[item,...history].slice(0,20);
    setHistory(updated);
    localStorage.setItem('gw_history',JSON.stringify(updated));
  };

  const handleAnalyze=useCallback(async({apiKey,company,extra,sector,urls})=>{
    setCtx({company,sector});
    setResult(null);setError('');setStreamText('');setCurrentStep(0);
    localStorage.setItem('gw_key',apiKey);
    setPage('/analiz');

    // Check demo first
    const demo=getDemoResult(company);
    if(demo){
      setCurrentStep(0);setStreamText('Demo verisi yükleniyor...');
      await new Promise(r=>setTimeout(r,700));
      setCurrentStep(1);setStreamText('Sektör kriterleri yüklendi ✓');
      await new Promise(r=>setTimeout(r,500));
      setCurrentStep(2);setStreamText('Greenwashing taktikleri analiz ediliyor...');
      await new Promise(r=>setTimeout(r,800));
      setCurrentStep(3);setStreamText('Skor hesaplanıyor...');
      await new Promise(r=>setTimeout(r,600));
      setCurrentStep(4);setStreamText('Rapor hazır ✓');
      await new Promise(r=>setTimeout(r,400));
      saveHistory(company,demo);
      setResult(demo);
      setPage('/sonuc');
      return;
    }

    try{
      setCurrentStep(0);
      const sr=await geminiSearch(apiKey,`Search for recent ESG reports, sustainability claims and greenwashing allegations about "${company}". Focus on carbon commitments, scope 3, certifications, controversies.`,t=>setStreamText(t));
      setCurrentStep(1);setStreamText('Sektör kriterleri yüklendi ✓');
      await new Promise(r=>setTimeout(r,500));
      setCurrentStep(2);setStreamText('');
      await new Promise(r=>setTimeout(r,15000)); // rate limit
      const prompt=buildPrompt(company,sector,sr.text,extra,urls);
      const parsed=await geminiJson(apiKey,prompt,t=>{setStreamText(t);setCurrentStep(3);});
      setCurrentStep(4);setStreamText('Rapor hazır ✓');
      await new Promise(r=>setTimeout(r,400));
      const withSources={...parsed,_sources:sr.sources||[]};
      saveHistory(company,withSources);
      setResult(withSources);
      setPage('/sonuc');
    }catch(e){
      const isQuota = e.message&&e.message.includes('quota');
      setError(isQuota
        ? 'API kotasi doldu. Demo şirketlerden birini dene: Shell, Zara, H&M, BP, Orsted, Patagonia, Tupras, Arcelik, THY, Garanti, Akbank, BIM, Migros, Vestel, LC Waikiki, Mavi, ExxonMobil, Amazon, Google, Microsoft, Apple, Nestle, Coca-Cola, Volkswagen, Unilever, IKEA, HSBC, McDonalds, Toyota, Walmart, Nike, KFC'
        : e.message||'Bir hata olustu.');
      setPage('/');
    }
  },[history]);

  const reset=()=>{setResult(null);setError('');setPage('/');};

  return(
    <>
      <TopBar onHome={reset} onHistory={()=>setPage('/gecmis')} onCompare={()=>setPage('/karsilastir')} histCount={history.length}/>
      {page==='/'&&<Home onAnalyze={handleAnalyze} error={error} onCompare={()=>setPage('/karsilastir')}/>}
      {page==='/analiz'&&!result&&<Analyzing company={ctx?.company||'...'} streamText={streamText} currentStep={currentStep}/>}
      {page==='/sonuc'&&result&&<Result result={result} company={ctx?.company||''} onReset={reset}/>}
      {page==='/karsilastir'&&<Compare onBack={reset}/>}
      {page==='/gecmis'&&<History history={history} onSelect={item=>{setResult(item.result);setCtx({company:item.company});setPage('/sonuc');}} onBack={reset} onClear={()=>{setHistory([]);localStorage.removeItem('gw_history');}}/>}
      {page==='/sonuc'&&!result&&<Home onAnalyze={handleAnalyze} error={error} onCompare={()=>setPage('/karsilastir')}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
